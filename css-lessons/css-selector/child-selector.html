<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/child-selector.css">
    <style>
        p {
            color: green;
            font-size: 25px;
        }

        .text-red {
            color: red;
        }

        #text-blue {
            color: blue;
        }
    </style>
</head>

<body>
    <p class="text-red" id="text-blue">hello1</p>

    <div class="box">
        <h2>Lorem ipsum dolor sit.</h2>
        <div class="child-1">
            <h2>Lorem ipsum dolor sit amet.</h2>
            <div class="child-2">
                <h2>Lorem ipsum dolor sit amet consectetur adipisicing elit.</h2>
            </div>
        </div>
    </div>
</body>

</html>
