<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form lesson</title>
</head>

<body>
    <form action="dashboard.html">
        <h3>Form Lesson</h3>
        <div>
            <label for="name"
                title="Username must be at least 4 characters long and contain only letters">Username</label>
            <br /> <br><br>
            <input id="name" autofocus type="text" required name="username" placeholder="Type Your Name" minlength="4"
                maxlength="20" />
        </div>
        <div>
            <label for="email">Email Address</label> <br />
            <input id="email" type="email" required name="email" placeholder="Type Your Email" />
        </div>
        <div>
            <label for="password">Password</label> <br />
            <input id="password" type="password" required name="password" placeholder="Type Your Password" />
        </div>
        <div>
            <label for="bio">Bio</label> <br />
            <textarea id="bio" name="bio" placeholder="Type Your Bio"></textarea>
        </div>
        <div>
            <label for="number">Phone Number</label> <br />
            <input id="number" type="tel" required name="number" placeholder="Type Your Phone Number" />
        </div>
        <div>
            <label for="color">Color</label> <br />
            <input id="color" type="color" required name="color" placeholder="Type Your Color" />
        </div>
        <div>
            <label for="">Birth Date</label> <br>
            <input id="birthDate" type="date" required name="birthDate" placeholder="Type Your Birth Date" />
        </div>
        <div>
            <label for="time">Time</label> <br>
            <input id="time" type="time" required name="time" placeholder="Type Your Time" />
        </div>
        <div>
            <label for="file">Upload Photo/File</label> <br>
            <input id="file" type="file" accept="image/*,.pdf" required name="file" />
        </div>
        <div>
            <label for="range">Range</label> <br>
            <input id="range" type="range" required name="range" />
        </div>
        <div>
            <label for="gender">Select Gender</label> <br>
            <input type="radio" id="male" checked name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
        </div>
        <div>
            <label for="hobbies">Hobbies</label> <br>
            <input type="checkbox" id="hobbies" name="hobbies" value="Cricket">
            <label for="hobbies">Cricket</label>
            <input type="checkbox" id="hobbies" name="hobbies" value="Football">
            <label for="hobbies">Football</label>
            <input type="checkbox" id="hobbies" name="hobbies" value="Reading">
            <label for="hobbies">Reading</label>
            <input type="checkbox" id="hobbies" name="hobbies" value="Music">
            <label for="hobbies">Music</label>
            <input type="checkbox" id="hobbies" name="hobbies" value="Travel">
            <label for="hobbies">Travel</label>
        </div>
        <div>
            <label for="country">Select Country</label> <br>
            <select name="country" id="country">
                <option value="">Select Country</option>
                <option value="india">India</option>
                <option value="pakistan">Pakistan</option>
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="uae">UAE</option>
                <option value="bangladesh">Bangladesh</option>
                <option value="nepal">Nepal</option>
                <option value="bhutan">Bhutan</option>
                <option value="maldives">Maldives</option>
                <option value="srilanka">Sri Lanka</option>
                <option value="afghanistan">Afghanistan</option>
                <option value="iran">Iran</option>
                <option value="iraq">Iraq</option>
                <option value="syria">Syria</option>
                <option value="jordan">Jordan</option>
                <option value="lebanon">Lebanon</option>
                <option value="palestine">Palestine</option>
                <option value="israel">Israel</option>
                <option value="qatar">Qatar</option>
                <option value="kuwait">Kuwait</option>
                <option value="bahrain">Bahrain</option>
                <option value="oman">Oman</option>
                <option value="yemen">Yemen</option>
                <option value="saudi-arabia">Saudi Arabia</option>
                <option value="kuwait">Kuwait</option>
                <option value="bahrain">Bahrain</option>
                <option value="oman">Oman</option>
                <option value="yemen">Yemen</option>
                <option value="saudi-arabia">Saudi Arabia</option>
            </select>
        </div>

        <input type="submit" value="Register" />
        <!-- <button type="submit">Login</button> -->
    </form>
</body>

</html>
